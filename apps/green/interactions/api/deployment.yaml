apiVersion: apps/v1
kind: Deployment
metadata:
  name: interactions-api
  namespace: interactions
spec:
  replicas: 1
  selector:
    matchLabels:
      app: interactions-api
  template:
    metadata:
      labels:
        app: interactions-api
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-for-db
          image: postgres:16-alpine
          securityContext:
            runAsUser: 70
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          command:
            - sh
            - -c
            - |
              until pg_isready -h $PGHOST -p $PGPORT -U $PGUSER; do
                echo "waiting for postgres..."; sleep 2;
              done
          env:
            - name: PGHOST
              valueFrom:
                secretKeyRef:
                  name: interactions-db-app
                  key: host
            - name: PGPORT
              valueFrom:
                secretKeyRef:
                  name: interactions-db-app
                  key: port
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: interactions-db-app
                  key: username
          resources:
            requests:
              memory: 32Mi
              cpu: 10m
            limits:
              memory: 64Mi
              cpu: 50m
      containers:
        - name: interactions
          image: python:3.12-alpine
          securityContext:
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          command: ["sh", "-c", "pip install psycopg2-binary -q && python /app/server.py"]
          ports:
            - containerPort: 8080
          env:
            - name: HOME
              value: /tmp
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: interactions-db-app
                  key: uri
          volumeMounts:
            - name: script
              mountPath: /app
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 128Mi
              cpu: 200m
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: script
          configMap:
            name: interactions-script
