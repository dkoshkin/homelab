---
apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: prometheus-adapter
  namespace: flux-system
spec:
  interval: 30m
  chart:
    spec:
      chart: prometheus-adapter
      version: "*"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
      interval: 1h
  releaseName: prometheus-adapter
  targetNamespace: observability
  values:
    prometheus:
      url: http://kube-prometheus-stack-prometheus.observability
      port: 9090
    # Replace metrics service
    rules:
      resource:
        cpu:
          containerQuery: |
            sum by (<<.GroupBy>>) (
              rate(container_cpu_usage_seconds_total{container!="", <<.LabelMatchers>>}[3m])
            )
          nodeQuery: |
            sum by (<<.GroupBy>>) (
              1 - rate(node_cpu_seconds_total{mode="idle"}[3m])
            )
          resources:
            overrides:
              namespace:
                resource: namespace
              node:
                resource: node
              pod:
                resource: pod
          containerLabel: container
        memory:
          containerQuery: |
            sum by (<<.GroupBy>>) (
              container_memory_working_set_bytes{container!="", <<.LabelMatchers>>}
            )
          nodeQuery: |
            sum by (<<.GroupBy>>) (
              node_memory_MemTotal_bytes{<<.LabelMatchers>>}
              - node_memory_MemAvailable_bytes{<<.LabelMatchers>>}
            )
          resources:
            overrides:
              namespace:
                resource: namespace
              node:
                resource: node
              pod:
                resource: pod
          containerLabel: container
        window: 3m
---
apiVersion: notification.toolkit.fluxcd.io/v1beta3
kind: Alert
metadata:
  name: prometheus-adapter
  namespace: flux-system
spec:
  summary: "Cluster: ${CLUSTER_NAME}, App: prometheus-adapter"
  providerRef:
    name: slack
  eventSeverity: info
  eventSources:
    - kind: Kustomization
      name: infra-prometheus-adapter
      namespace: flux-system
    - kind: HelmRelease
      name: prometheus-adapter
      namespace: flux-system
